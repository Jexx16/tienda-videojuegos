<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - GameStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .navbar {
            background: #0f3460;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: white; }
        .nav-brand span { color: #e94560; }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        .nav-links a:hover { background: #e94560; }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: white;
        }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .cart-container { background: white; border-radius: 10px; overflow: hidden; }
        .cart-header, .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        .cart-header { background: #0f3460; color: white; font-weight: bold; }
        .cart-item { text-align: center; }
        .cart-item div:first-child { text-align: left; }
        .cart-total { text-align: right; padding: 1rem; font-size: 1.2rem; font-weight: bold; border-top: 2px solid #eee; }
        .btn-checkout {
            background: #4CAF50;
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-checkout:hover { background: #45a049; }
        .btn-remove { background: #ff4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 5px; cursor: pointer; }
        .btn-update { background: #2196F3; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 5px; cursor: pointer; }
        .cart-empty { text-align: center; padding: 3rem; color: #666; }
        .footer { text-align: center; padding: 2rem; color: white; }

        /* ========== NOTIFICACIONES MODERNAS ========== */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 320px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10000;
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification.success { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border-left: 4px solid #81C784; }
        .toast-notification.error { background: linear-gradient(135deg, #f44336, #c62828); color: white; border-left: 4px solid #ef9a9a; }
        .toast-notification.info { background: linear-gradient(135deg, #2196F3, #1565C0); color: white; border-left: 4px solid #90caf9; }
        .toast-notification .toast-icon { font-size: 20px; }
        .toast-notification .toast-message { flex: 1; }
        .toast-notification .toast-close { cursor: pointer; font-size: 18px; opacity: 0.7; transition: opacity 0.2s; }
        .toast-notification .toast-close:hover { opacity: 1; }

        /* ========== MODAL DE CONFIRMACIÓN ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 10001;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .btn-confirm {
            background: #4CAF50;
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-confirm:hover { background: #45a049; transform: scale(1.02); }
        .btn-cancel {
            background: #f44336;
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-cancel:hover { background: #d32f2f; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🎮 <span>Game</span>Store</div>
        <div class="nav-links">
            <span class="user-info" id="userInfo">Cargando...</span>
            <a href="/tienda.html">🏠 Tienda</a>
            <a href="javascript:logout()">🚪 Salir</a>
        </div>
    </div>

    <div class="container">
        <div id="carritoContainer" class="cart-container">
            <div>Cargando carrito...</div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 GameStore - Todos los derechos reservados</p>
    </div>

    <script>
        const API = "http://localhost:8080";
        const usuarioId = localStorage.getItem('usuarioId');
        const usuarioNombre = localStorage.getItem('usuarioNombre');

        if (!usuarioId) window.location.href = "login.html";
        document.getElementById('userInfo').innerText = `👋 ${usuarioNombre}`;

        function mostrarToast(mensaje, tipo) {
            const iconos = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast-notification ${tipo}`;
            toast.innerHTML = `
                <div class="toast-icon">${iconos[tipo]}</div>
                <div class="toast-message">${mensaje}</div>
                <div class="toast-close">✕</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            toast.querySelector('.toast-close').onclick = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            };
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        function mostrarConfirmacion(mensaje, titulo, onConfirm) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🎮</div>
                    <h3 style="color: #333; margin-bottom: 0.5rem;">${titulo}</h3>
                    <p style="color: #666; margin-bottom: 1.5rem;">${mensaje}</p>
                    <div class="modal-buttons">
                        <button class="btn-confirm" id="modalConfirmBtn">✅ Sí, comprar</button>
                        <button class="btn-cancel" id="modalCancelBtn">❌ Cancelar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('modalConfirmBtn').onclick = () => {
                modal.remove();
                onConfirm();
            };
            document.getElementById('modalCancelBtn').onclick = () => {
                modal.remove();
            };
        }

        function cargarCarrito() {
            fetch(API + "/api/carrito/usuario/" + usuarioId)
                .then(res => res.json())
                .then(data => mostrarCarrito(data));
        }

        function mostrarCarrito(data) {
            const items = data.items || [];
            const total = data.total || 0;

            if (items.length === 0) {
                document.getElementById("carritoContainer").innerHTML = `
                    <div class="cart-empty">
                        <h3>🛒 Tu carrito está vacío</h3>
                        <p>Explora nuestra tienda y agrega juegos.</p>
                        <a href="/tienda.html" style="background:#e94560; color:white; padding:0.5rem 1rem; text-decoration:none; border-radius:5px; display:inline-block; margin-top:1rem;">Ir a la tienda</a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="cart-header">
                    <div>Juego</div>
                    <div>Cantidad</div>
                    <div>Precio</div>
                    <div>Acciones</div>
                </div>
            `;

            items.forEach(item => {
                html += `
                    <div class="cart-item">
                        <div>${item.juego.titulo}</div>
                        <div>
                            <input type="number" id="cantidad-${item.id}" value="${item.cantidad}" min="1" style="width:60px; padding:0.3rem; text-align:center;">
                            <button class="btn-update" onclick="actualizarCantidad(${item.id})">Act.</button>
                        </div>
                        <div>$${item.precioUnitario.toFixed(2)}</div>
                        <div><button class="btn-remove" onclick="eliminarItem(${item.id})">Eliminar</button></div>
                    </div>
                `;
            });

            html += `
                <div class="cart-total">Total: $${total.toFixed(2)}</div>
                <button class="btn-checkout" onclick="checkout()">✅ Finalizar Compra</button>
            `;

            document.getElementById("carritoContainer").innerHTML = html;
        }

        function actualizarCantidad(itemId) {
            const cantidad = document.getElementById(`cantidad-${itemId}`).value;
            fetch(API + "/api/carrito/actualizar/" + itemId, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ cantidad: parseInt(cantidad) })
            })
            .then(async res => {
                if (res.ok) {
                    cargarCarrito();
                } else {
                    const err = await res.text();
                    mostrarToast("❌ " + err, "error");
                }
            });
        }

        function eliminarItem(itemId) {
            if (!confirm("¿Eliminar este juego del carrito?")) return;
            fetch(API + "/api/carrito/eliminar/" + itemId, { method: "DELETE" })
                .then(() => cargarCarrito());
        }

        function checkout() {
            mostrarConfirmacion(
                "¿Estás seguro de que deseas finalizar esta compra?",
                "Confirmar compra",
                () => {
                    fetch(API + "/api/ventas/procesar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ usuarioId: parseInt(usuarioId) })
                    })
                    .then(async res => {
                        if (res.ok) {
                            mostrarToast("✅ Compra realizada con éxito!", "success");
                            setTimeout(() => window.location.href = "/tienda.html", 1500);
                        } else {
                            const err = await res.text();
                            mostrarToast("❌ " + err, "error");
                        }
                    });
                }
            );
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        cargarCarrito();
    </script>
</body>
</html>
