<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore | Tu tienda de videojuegos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .navbar {
            background: #0f3460;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .nav-brand span {
            color: #e94560;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: #e94560;
        }

        .btn-login {
            background: #e94560;
        }

        .header {
            text-align: center;
            padding: 3rem 1rem;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .header h1 span {
            color: #e94560;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 2rem;
        }

        .search-section {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto 1rem;
        }

        .search-box input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
        }

        .search-box button {
            padding: 1rem 2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .filters {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1.2rem;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #e94560;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 🔥 IMAGEN UNIFORME 🔥 */
        .game-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .game-card:hover .game-image img {
            transform: scale(1.05);
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-info h3 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .game-category {
            color: #e94560;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .game-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0f3460;
            margin: 0.5rem 0;
        }

        .game-stock {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .game-stock.disponible {
            color: #4CAF50;
        }

        .login-message {
            background: #f0f0f0;
            padding: 0.5rem;
            text-align: center;
            border-radius: 5px;
            font-size: 0.8rem;
            color: #666;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: white;
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🎮 <span>Game</span>Store</div>
        <div class="nav-links">
            <a href="/index.html">🏠 Inicio</a>
            <a href="/login.html" class="btn-login">🔑 Iniciar Sesión</a>
            <a href="/registro.html" class="btn-login">📝 Registrarse</a>
        </div>
    </div>

    <div class="header">
        <h1>🎮 <span>Game</span>Store</h1>
        <p>Tu tienda online de videojuegos favorita</p>
    </div>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar juegos por título, categoría o plataforma..." onkeypress="if(event.key==='Enter') buscarJuegos()">
                <button onclick="buscarJuegos()">🔍 Buscar</button>
            </div>
            <div class="filters" id="filters">
                <button class="filter-btn active" onclick="filtrarPorCategoria('todos')">Todos</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Aventura')">Aventura</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Acción')">Acción</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('RPG')">RPG</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Plataformas')">Plataformas</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Shooter')">Shooter</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Sandbox')">Sandbox</button>
                <button class="filter-btn" onclick="filtrarPorCategoria('Deportes')">Deportes</button>
            </div>
        </div>

        <div id="gamesContainer" class="games-grid">
            <div style="text-align:center;color:white;">Cargando juegos...</div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 GameStore - Todos los derechos reservados</p>
    </div>

    <script>
        const API = "http://localhost:8080";
        let juegos = [];

        function cargarJuegos() {
            fetch(API + "/api/juegos/todos")
                .then(res => res.json())
                .then(data => {
                    juegos = data;
                    mostrarJuegos(data);
                })
                .catch(err => console.error("Error:", err));
        }

        function mostrarJuegos(lista) {
            let html = "";
            if (lista.length === 0) {
                html = "<div style='text-align:center;color:white;'>No se encontraron juegos</div>";
            } else {
                lista.forEach(juego => {
                    let stockClass = juego.stock > 0 ? "disponible" : "";
                    let stockText = juego.stock > 0 ? `📦 Stock: ${juego.stock}` : "❌ Agotado";
                    let imagenUrl = juego.imagenUrl ? `/images/${juego.imagenUrl}` : "";

                    html += `
                        <div class="game-card" onclick="irADetalle(${juego.id})">
                            <div class="game-image">
                                ${imagenUrl ? `<img src="${imagenUrl}" alt="${juego.titulo}" onerror="this.src='https://via.placeholder.com/400x400?text=🎮'">` : '<div style="font-size:4rem;">🎮</div>'}
                            </div>
                            <div class="game-info">
                                <h3>${juego.titulo}</h3>
                                <div class="game-category">${juego.categoria || 'General'} | ${juego.plataforma || 'Multi'}</div>
                                <div class="game-price">$${juego.precio.toFixed(2)}</div>
                                <div class="game-stock ${stockClass}">${stockText}</div>
                                <div class="login-message">🔐 Inicia sesión para comprar</div>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById("gamesContainer").innerHTML = html;
        }

        function buscarJuegos() {
            let termino = document.getElementById("searchInput").value.trim();
            if (!termino) {
                mostrarJuegos(juegos);
                return;
            }
            fetch(API + "/api/juegos/buscar?q=" + encodeURIComponent(termino))
                .then(res => res.json())
                .then(data => mostrarJuegos(data));
        }

        function filtrarPorCategoria(categoria) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (categoria === 'todos') {
                mostrarJuegos(juegos);
                return;
            }
            fetch(API + "/api/juegos/categoria/" + categoria)
                .then(res => res.json())
                .then(data => mostrarJuegos(data));
        }

        function irADetalle(id) {
            alert("Inicia sesión para ver detalles y comprar este juego.");
            window.location.href = "login.html";
        }

        cargarJuegos();
    </script>
</body>
</html>
