<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GameStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 2rem; }
        .login-header h1 span { color: #e94560; }
        .login-header p { color: #666; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .input-group input:focus { border-color: #e94560; outline: none; }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-login:hover { background: #c73e56; }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .btn-register:hover { background: #e94560; color: white; }
        .alert { display: none; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert.show { display: block; }
        .demo-credentials {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎮 <span>Game</span>Store</h1>
            <p>Inicia sesión para comprar</p>
        </div>

        <div class="alert" id="alertMessage"></div>

        <div class="input-group">
            <label>👤 Usuario</label>
            <input type="text" id="nombre" placeholder="Ingresa tu usuario">
        </div>

        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña">
        </div>

        <button class="btn-login" onclick="login()">Iniciar Sesión</button>

        <div class="demo-credentials">
            <p>✨ Demo usuario: usuario1 / 123456 (usuario normal)</p>
            <p>👑 Admin: jesus / 12345 (administrador)</p>
        </div>

        <a href="registro.html" class="btn-register">📝 Crear una cuenta</a>
    </div>

    <script>
        const API = "http://localhost:8080";

        function mostrarMensaje(mensaje, tipo) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = mensaje;
            alert.className = `alert alert-${tipo} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        function login() {
            const nombre = document.getElementById("nombre").value;
            const password = document.getElementById("password").value;

            if (!nombre || !password) {
                mostrarMensaje("Por favor completa todos los campos", "error");
                return;
            }

            fetch(API + "/api/usuarios/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, password })
            })
            .then(async res => {
                if (res.ok) return res.json();
                else { const err = await res.text(); throw new Error(err); }
            })
            .then(data => {
                localStorage.setItem('usuarioId', data.id);
                localStorage.setItem('usuarioNombre', data.nombre);
                localStorage.setItem('usuarioRol', data.rol);
                mostrarMensaje("✅ Login exitoso! Redirigiendo...", "success");
                setTimeout(() => {
                    if (data.rol === 'ADMIN') window.location.href = "/admin/dashboard.html";
                    else window.location.href = "/tienda.html";
                }, 1500);
            })
            .catch(err => mostrarMensaje("❌ " + err.message, "error"));
        }
    </script>
</body>
</html>
