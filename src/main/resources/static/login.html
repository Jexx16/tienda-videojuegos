<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GameStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 2rem; }
        .login-header h1 span { color: #e94560; }
        .login-header p { color: #666; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .input-group input:focus { border-color: #e94560; outline: none; }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-login:hover { background: #c73e56; }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .btn-register:hover { background: #e94560; color: white; }
        .demo-credentials {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            text-align: center;
        }

        /* ========== NOTIFICACIONES MODERNAS ARRIBA ========== */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 320px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10000;
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification.success { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border-left: 4px solid #81C784; }
        .toast-notification.error { background: linear-gradient(135deg, #f44336, #c62828); color: white; border-left: 4px solid #ef9a9a; }
        .toast-notification.info { background: linear-gradient(135deg, #2196F3, #1565C0); color: white; border-left: 4px solid #90caf9; }
        .toast-notification .toast-icon { font-size: 20px; }
        .toast-notification .toast-message { flex: 1; }
        .toast-notification .toast-close { cursor: pointer; font-size: 18px; opacity: 0.7; transition: opacity 0.2s; }
        .toast-notification .toast-close:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎮 <span>Game</span>Store</h1>
            <p>Inicia sesión para comprar</p>
        </div>

        <div class="input-group">
            <label>👤 Usuario</label>
            <input type="text" id="nombre" placeholder="Ingresa tu usuario">
        </div>

        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña">
        </div>

        <button class="btn-login" onclick="login()">Iniciar Sesión</button>

        <div class="demo-credentials">
            <p>✨ Demo usuario: usuario1 / 123456</p>
            <p>👑 Admin: jesus / 12345</p>
        </div>

        <a href="registro.html" class="btn-register">📝 Crear una cuenta</a>
    </div>

    <script>
        const API = "http://localhost:8080";

        function mostrarToast(mensaje, tipo) {
            const iconos = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast-notification ${tipo}`;
            toast.innerHTML = `
                <div class="toast-icon">${iconos[tipo]}</div>
                <div class="toast-message">${mensaje}</div>
                <div class="toast-close">✕</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            toast.querySelector('.toast-close').onclick = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            };
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        function login() {
            const nombre = document.getElementById("nombre").value;
            const password = document.getElementById("password").value;

            if (!nombre || !password) {
                mostrarToast("Por favor completa todos los campos", "error");
                return;
            }

            fetch(API + "/api/usuarios/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, password })
            })
            .then(async res => {
                if (res.ok) return res.json();
                else { const err = await res.text(); throw new Error(err); }
            })
            .then(data => {
                localStorage.setItem('usuarioId', data.id);
                localStorage.setItem('usuarioNombre', data.nombre);
                localStorage.setItem('usuarioRol', data.rol);
                mostrarToast("✅ Login exitoso! Redirigiendo...", "success");
                setTimeout(() => {
                    if (data.rol === 'ADMIN') window.location.href = "/admin/dashboard.html";
                    else window.location.href = "/tienda.html";
                }, 1500);
            })
            .catch(err => mostrarToast("❌ " + err.message, "error"));
        }
    </script>
</body>
</html>
