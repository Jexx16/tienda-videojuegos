<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Juegos - GameStore Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .navbar {
            background: #0f3460;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: white; }
        .nav-brand span { color: #e94560; }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .nav-links a:hover { background: #e94560; }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: white; text-align: center; margin-bottom: 2rem; }
        .btn-crear {
            background: #4CAF50;
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .btn-crear:hover { background: #45a049; }
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 5px;
        }
        .search-box button {
            padding: 0.8rem 2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #0f3460;
            color: white;
            padding: 1rem;
            text-align: left;
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        .btn-edit {
            background: #2196F3;
            color: white;
            padding: 0.3rem 1rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .btn-delete {
            background: #ff4444;
            color: white;
            padding: 0.3rem 1rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal-content button {
            padding: 0.8rem 2rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 1rem;
        }
        .btn-cancel { background: #ff4444; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🎮 <span>Game</span>Store Admin</div>
        <div class="nav-links">
            <span class="user-info" id="userInfo">Cargando...</span>
            <a href="/admin/dashboard.html">📊 Dashboard</a>
            <a href="/admin/juegos.html">🎮 Gestionar Juegos</a>
            <a href="javascript:logout()">🚪 Salir</a>
        </div>
    </div>

    <div class="container">
        <h1>🎮 Gestión de Juegos</h1>

        <button class="btn-crear" onclick="abrirModalCrear()">➕ Nuevo Juego</button>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar juegos...">
            <button onclick="buscarJuegos()">🔍 Buscar</button>
        </div>

        <div id="juegosContainer">
            <table>
                <thead>
                    <tr><th>ID</th><th>Imagen</th><th>Título</th><th>Categoría</th><th>Plataforma</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
                </thead>
                <tbody id="listaJuegos"><tr><td colspan="8" style="text-align:center;">Cargando juegos...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="modalJuego" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo">Nuevo Juego</h3>
            <input type="hidden" id="juegoId">
            <label>Título:</label>
            <input type="text" id="titulo" required>
            <label>Categoría:</label>
            <select id="categoria">
                <option value="Aventura">Aventura</option>
                <option value="Acción">Acción</option>
                <option value="RPG">RPG</option>
                <option value="Plataformas">Plataformas</option>
                <option value="Shooter">Shooter</option>
                <option value="Sandbox">Sandbox</option>
                <option value="Deportes">Deportes</option>
            </select>
            <label>Plataforma:</label>
            <select id="plataforma">
                <option value="Nintendo Switch">Nintendo Switch</option>
                <option value="PlayStation 5">PlayStation 5</option>
                <option value="PC">PC</option>
                <option value="Xbox Series X">Xbox Series X</option>
                <option value="Multiplataforma">Multiplataforma</option>
            </select>
            <label>Precio:</label>
            <input type="number" id="precio" step="0.01" min="0" required>
            <label>Stock:</label>
            <input type="number" id="stock" min="0" value="1">
            <label>Imagen URL (nombre del archivo):</label>
            <input type="text" id="imagenUrl" placeholder="ej: zelda.jpg">
            <label>Descripción:</label>
            <textarea id="descripcion" rows="3"></textarea>
            <div style="margin-top:1rem;">
                <button onclick="guardarJuego()">Guardar</button>
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080";
        let juegos = [];

        const usuarioId = localStorage.getItem('usuarioId');
        const usuarioNombre = localStorage.getItem('usuarioNombre');
        const usuarioRol = localStorage.getItem('usuarioRol');

        if (!usuarioId || usuarioRol !== 'ADMIN') window.location.href = "/login.html";
        document.getElementById('userInfo').innerText = `👑 ${usuarioNombre}`;

        function cargarJuegos() {
            fetch(API + "/api/admin/juegos")
                .then(res => res.json())
                .then(data => { juegos = data; mostrarJuegos(data); });
        }

        function mostrarJuegos(lista) {
            let html = "";
            lista.forEach(juego => {
                html += `
                    <tr>
                        <td>${juego.id}</td>
                        <td>${juego.imagenUrl ? '🖼️' : '🎮'}</td>
                        <td>${juego.titulo}</td>
                        <td>${juego.categoria || '-'}</td>
                        <td>${juego.plataforma || '-'}</td>
                        <td>$${juego.precio.toFixed(2)}</td>
                        <td>${juego.stock}</td>
                        <td>
                            <button class="btn-edit" onclick="editarJuego(${juego.id})">✏️ Editar</button>
                            <button class="btn-delete" onclick="eliminarJuego(${juego.id})">🗑️ Eliminar</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById("listaJuegos").innerHTML = html || '<tr><td colspan="8">No hay juegos</td></tr>';
        }

        function buscarJuegos() {
            const termino = document.getElementById("searchInput").value.toLowerCase();
            if (!termino) { mostrarJuegos(juegos); return; }
            const filtrados = juegos.filter(j => j.titulo.toLowerCase().includes(termino));
            mostrarJuegos(filtrados);
        }

        function abrirModalCrear() {
            document.getElementById('modalTitulo').innerText = 'Nuevo Juego';
            document.getElementById('juegoId').value = '';
            document.getElementById('titulo').value = '';
            document.getElementById('categoria').value = 'Aventura';
            document.getElementById('plataforma').value = 'Multiplataforma';
            document.getElementById('precio').value = '';
            document.getElementById('stock').value = 1;
            document.getElementById('imagenUrl').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('modalJuego').style.display = 'flex';
        }

        function editarJuego(id) {
            const juego = juegos.find(j => j.id === id);
            if (!juego) return;
            document.getElementById('modalTitulo').innerText = 'Editar Juego';
            document.getElementById('juegoId').value = juego.id;
            document.getElementById('titulo').value = juego.titulo;
            document.getElementById('categoria').value = juego.categoria || 'Aventura';
            document.getElementById('plataforma').value = juego.plataforma || 'Multiplataforma';
            document.getElementById('precio').value = juego.precio;
            document.getElementById('stock').value = juego.stock;
            document.getElementById('imagenUrl').value = juego.imagenUrl || '';
            document.getElementById('descripcion').value = juego.descripcion || '';
            document.getElementById('modalJuego').style.display = 'flex';
        }

        function guardarJuego() {
            const juego = {
                titulo: document.getElementById('titulo').value,
                categoria: document.getElementById('categoria').value,
                plataforma: document.getElementById('plataforma').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                imagenUrl: document.getElementById('imagenUrl').value,
                descripcion: document.getElementById('descripcion').value
            };
            if (!juego.titulo || !juego.precio) { alert("Título y precio son obligatorios"); return; }

            const id = document.getElementById('juegoId').value;
            const url = id ? API + "/api/admin/juegos/" + id : API + "/api/admin/juegos";
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(juego)
            })
            .then(async res => {
                if (res.ok) {
                    alert(id ? '✅ Juego actualizado' : '✅ Juego creado');
                    cerrarModal();
                    cargarJuegos();
                } else {
                    const err = await res.text();
                    alert("❌ " + err);
                }
            });
        }

        function eliminarJuego(id) {
            if (!confirm('¿Eliminar este juego?')) return;
            fetch(API + "/api/admin/juegos/" + id, { method: 'DELETE' })
                .then(() => cargarJuegos());
        }

        function cerrarModal() { document.getElementById('modalJuego').style.display = 'none'; }
        function logout() { localStorage.clear(); window.location.href = "/login.html"; }

        cargarJuegos();
    </script>
</body>
</html>
