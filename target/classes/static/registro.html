<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GameStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        .register-header { text-align: center; margin-bottom: 2rem; }
        .register-header h1 { font-size: 2rem; }
        .register-header h1 span { color: #e94560; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: #e94560; outline: none; }
        .input-group input.error { border-color: #f44336; }
        .input-group input.valid { border-color: #4CAF50; }
        .error-message {
            font-size: 0.75rem;
            color: #f44336;
            margin-top: 0.3rem;
            display: none;
        }
        .error-message.show { display: block; }
        .password-strength {
            margin-top: 0.5rem;
            height: 5px;
            border-radius: 3px;
            background: #e0e0e0;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        .strength-weak { background: #f44336; width: 33.33%; }
        .strength-medium { background: #ff9800; width: 66.66%; }
        .strength-strong { background: #4CAF50; width: 100%; }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-register:hover { background: #c73e56; }
        .btn-register:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .btn-login:hover { background: #e94560; color: white; }

        /* ========== NOTIFICACIONES MODERNAS ARRIBA ========== */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 320px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10000;
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification.success { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border-left: 4px solid #81C784; }
        .toast-notification.error { background: linear-gradient(135deg, #f44336, #c62828); color: white; border-left: 4px solid #ef9a9a; }
        .toast-notification.info { background: linear-gradient(135deg, #2196F3, #1565C0); color: white; border-left: 4px solid #90caf9; }
        .toast-notification .toast-icon { font-size: 20px; }
        .toast-notification .toast-message { flex: 1; }
        .toast-notification .toast-close { cursor: pointer; font-size: 18px; opacity: 0.7; transition: opacity 0.2s; }
        .toast-notification .toast-close:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🎮 <span>Game</span>Store</h1>
            <p>Crea tu cuenta</p>
        </div>

        <div class="input-group">
            <label>👤 Usuario</label>
            <input type="text" id="nombre" placeholder="Elige un usuario">
            <div class="error-message" id="nombreError">El usuario es obligatorio</div>
        </div>

        <div class="input-group">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="tu@email.com">
            <div class="error-message" id="emailError">Ingresa un email válido (ej: usuario@dominio.com)</div>
        </div>

        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            <div class="password-strength">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="error-message" id="passwordError">La contraseña debe tener al menos 6 caracteres</div>
        </div>

        <div class="input-group">
            <label>🔒 Confirmar contraseña</label>
            <input type="password" id="confirmPassword" placeholder="Repite la contraseña">
            <div class="error-message" id="confirmError">Las contraseñas no coinciden</div>
        </div>

        <button class="btn-register" id="registerBtn" onclick="registrar()">Registrarse</button>

        <a href="login.html" class="btn-login">🔑 Ya tengo cuenta</a>
    </div>

    <script>
        const API = "http://localhost:8080";

        const nombreInput = document.getElementById('nombre');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const registerBtn = document.getElementById('registerBtn');

        function validarNombre() {
            const nombre = nombreInput.value.trim();
            const isValid = nombre !== '';
            document.getElementById('nombreError').classList.toggle('show', !isValid);
            nombreInput.classList.toggle('error', !isValid);
            nombreInput.classList.toggle('valid', isValid);
            return isValid;
        }

        function validarEmail() {
            const email = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const isValid = emailRegex.test(email);
            document.getElementById('emailError').classList.toggle('show', !isValid && email !== '');
            emailInput.classList.toggle('error', !isValid && email !== '');
            emailInput.classList.toggle('valid', isValid);
            return isValid;
        }

        function validarPassword() {
            const password = passwordInput.value;
            const isValid = password.length >= 6;
            document.getElementById('passwordError').classList.toggle('show', !isValid && password !== '');
            passwordInput.classList.toggle('error', !isValid && password !== '');
            passwordInput.classList.toggle('valid', isValid);
            
            const strengthBar = document.getElementById('strengthBar');
            strengthBar.classList.remove('strength-weak', 'strength-medium', 'strength-strong');
            if (password.length >= 6) {
                if (password.length >= 10) {
                    strengthBar.classList.add('strength-strong');
                } else if (password.length >= 8) {
                    strengthBar.classList.add('strength-medium');
                } else {
                    strengthBar.classList.add('strength-weak');
                }
            } else {
                strengthBar.style.width = '0';
            }
            return isValid;
        }

        function validarConfirmPassword() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const isValid = password === confirm && password !== '';
            document.getElementById('confirmError').classList.toggle('show', !isValid && confirm !== '');
            confirmInput.classList.toggle('error', !isValid && confirm !== '');
            confirmInput.classList.toggle('valid', isValid);
            return isValid;
        }

        function validarFormulario() {
            const nombreOk = validarNombre();
            const emailOk = validarEmail();
            const passwordOk = validarPassword();
            const confirmOk = validarConfirmPassword();
            
            registerBtn.disabled = !(nombreOk && emailOk && passwordOk && confirmOk);
            return nombreOk && emailOk && passwordOk && confirmOk;
        }

        nombreInput.addEventListener('input', validarFormulario);
        emailInput.addEventListener('input', validarFormulario);
        passwordInput.addEventListener('input', () => {
            validarPassword();
            validarFormulario();
        });
        confirmInput.addEventListener('input', () => {
            validarConfirmPassword();
            validarFormulario();
        });

        function mostrarToast(mensaje, tipo) {
            const iconos = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast-notification ${tipo}`;
            toast.innerHTML = `
                <div class="toast-icon">${iconos[tipo]}</div>
                <div class="toast-message">${mensaje}</div>
                <div class="toast-close">✕</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            toast.querySelector('.toast-close').onclick = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            };
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        function registrar() {
            if (!validarFormulario()) {
                mostrarToast("Por favor completa todos los campos correctamente", "error");
                return;
            }

            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            fetch(API + "/api/usuarios/registro", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, email, password })
            })
            .then(async res => {
                if (res.ok) {
                    mostrarToast("✅ Registro exitoso! Redirigiendo al login...", "success");
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    const err = await res.text();
                    mostrarToast("❌ " + err, "error");
                }
            })
            .catch(() => mostrarToast("❌ Error de conexión", "error"));
        }
    </script>
</body>
</html>
