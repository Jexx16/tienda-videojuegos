<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GameStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .register-header { text-align: center; margin-bottom: 2rem; }
        .register-header h1 { font-size: 2rem; }
        .register-header h1 span { color: #e94560; }
        .register-header p { color: #666; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .input-group input:focus { border-color: #e94560; outline: none; }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-register:hover { background: #c73e56; }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .btn-login:hover { background: #e94560; color: white; }
        .alert { display: none; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-error { background: #ffebee; color: #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .alert.show { display: block; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🎮 <span>Game</span>Store</h1>
            <p>Crea tu cuenta</p>
        </div>

        <div class="alert" id="alertMessage"></div>

        <div class="input-group">
            <label>👤 Usuario</label>
            <input type="text" id="nombre" placeholder="Elige un usuario">
        </div>

        <div class="input-group">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>

        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>

        <button class="btn-register" onclick="registrar()">Registrarse</button>

        <a href="login.html" class="btn-login">🔑 Ya tengo cuenta</a>
    </div>

    <script>
        const API = "http://localhost:8080";

        function mostrarMensaje(mensaje, tipo) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = mensaje;
            alert.className = `alert ${tipo} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        function registrar() {
            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!nombre || !email || !password) {
                mostrarMensaje("Todos los campos son obligatorios", "error");
                return;
            }
            if (password.length < 6) {
                mostrarMensaje("La contraseña debe tener al menos 6 caracteres", "error");
                return;
            }

            fetch(API + "/api/usuarios/registro", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, email, password })
            })
            .then(async res => {
                if (res.ok) {
                    mostrarMensaje("✅ Registro exitoso! Redirigiendo al login...", "success");
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    const err = await res.text();
                    mostrarMensaje("❌ " + err, "error");
                }
            })
            .catch(() => mostrarMensaje("❌ Error de conexión", "error"));
        }
    </script>
</body>
</html>
